name: Build Mobile App

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build APK
        working-directory: apps/mobile
        run: eas build --platform android --profile preview --local --non-interactive --output ${{ github.workspace }}/nutrition-assistant.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: nutrition-assistant.apk
          retention-days: 30

  build-ios-simulator:
    name: Build iOS Simulator
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build iOS Simulator
        working-directory: apps/mobile
        run: eas build --platform ios --profile ios-simulator --local --non-interactive --output ${{ github.workspace }}/nutrition-assistant-simulator.tar.gz

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator
          path: nutrition-assistant-simulator.tar.gz
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios-simulator]
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Download iOS Simulator build
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-build-${{ github.run_number }}
          name: "Mobile Build #${{ github.run_number }}"
          body: |
            Automated mobile build from commit ${{ github.sha }}

            **Android:** Download `nutrition-assistant.apk` and install on device
            **iOS Simulator:** Download and extract `nutrition-assistant-simulator.tar.gz`, drag `.app` into simulator
          files: |
            nutrition-assistant.apk
            nutrition-assistant-simulator.tar.gz
          draft: false
          prerelease: false
