name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

env:
  REGION: ${{ secrets.GCP_REGION }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/nutrition-api
  CLOUD_SQL_CONNECTION: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}

jobs:
  # ============================================================
  # Job 1: Database Migrations
  # Runs Prisma migrations against Cloud SQL via Auth Proxy.
  # Fails fast BEFORE container deploy if migration has issues.
  # ============================================================
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download Cloud SQL Auth Proxy
        run: |
          curl -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy
        run: |
          ./cloud-sql-proxy "${{ env.CLOUD_SQL_CONNECTION }}" \
            --port 5432 &
          sleep 3
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Run Prisma Migrations
        run: yarn workspace @nutrition/api exec prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@localhost:5432/${{ secrets.DB_NAME }}?schema=public&sslmode=disable"

      - name: Stop Cloud SQL Proxy
        if: always()
        run: pkill -f cloud-sql-proxy || true

  # ============================================================
  # Job 2: Build & Deploy
  # Builds Docker image, pushes to Artifact Registry, deploys
  # to Cloud Run with Cloud SQL connector + Secret Manager refs.
  # ============================================================
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t "${{ env.IMAGE }}:${{ github.sha }}" \
            -t "${{ env.IMAGE }}:latest" \
            .

      - name: Push to Artifact Registry
        run: |
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          secrets: |
            DATABASE_URL=database-url:latest
            JWT_SECRET=jwt-secret:latest
          flags: |
            --memory=512Mi
            --cpu=1
            --concurrency=150
            --timeout=300
            --max-instances=100
            --min-instances=0
            --port=8080
            --service-account=${{ secrets.WIF_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=${{ env.CLOUD_SQL_CONNECTION }}
