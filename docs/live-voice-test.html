<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meal Assistant Live App</title>
    <style>
      :root {
        --bg: #eef3f7;
        --phone: #f9fcff;
        --panel: #ffffff;
        --ink: #112137;
        --muted: #5a6e88;
        --line: #d0dce8;
        --accent: #0f766e;
        --accent-2: #0a5f58;
        --model: #e4f0ff;
        --user: #d9fbef;
        --system: #fff2cc;
        --danger: #b91c1c;
        --warn: #9a5a0a;
        --ok: #166534;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Trebuchet MS', 'Avenir Next', sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 380px at 5% -10%, rgba(15, 118, 110, 0.2), transparent),
          radial-gradient(860px 340px at 100% -8%, rgba(14, 165, 233, 0.2), transparent),
          linear-gradient(170deg, #f2f7fb 0%, #e7eff6 100%);
      }
      .app {
        max-width: 460px;
        margin: 0 auto;
        padding: 14px 12px 22px;
      }
      .phone {
        border: 1px solid var(--line);
        border-radius: 26px;
        padding: 12px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 252, 255, 0.95));
        box-shadow: 0 20px 40px rgba(16, 33, 55, 0.12);
      }
      .topbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
      }
      .brand h1 {
        margin: 0;
        font-size: 17px;
      }
      .brand p {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
      }
      .status-pill {
        padding: 5px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        background: #fff;
        color: var(--warn);
      }
      .status-pill.ok {
        color: var(--ok);
        border-color: rgba(22, 101, 52, 0.25);
        background: rgba(22, 101, 52, 0.08);
      }
      .status-pill.warn {
        color: var(--warn);
        border-color: rgba(154, 90, 10, 0.25);
        background: rgba(154, 90, 10, 0.08);
      }
      .status-pill.bad {
        color: var(--danger);
        border-color: rgba(185, 28, 28, 0.25);
        background: rgba(185, 28, 28, 0.09);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .top-actions {
        margin-top: 10px;
      }
      .mode-switch {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
        margin-top: 8px;
      }
      .mode-switch button.active {
        background: #144f4a;
        box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.2);
      }
      .mode-panel.hidden {
        display: none;
      }
      .chat-feed {
        height: 360px;
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px;
        overflow: auto;
        background:
          radial-gradient(circle at 0% 0%, rgba(13, 148, 136, 0.08), transparent 36%),
          radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.08), transparent 36%), #fff;
      }
      .chat-empty {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        padding: 20px 10px;
      }
      .bubble-row {
        display: flex;
        margin-bottom: 8px;
      }
      .bubble-row.user {
        justify-content: flex-end;
      }
      .bubble-row.model,
      .bubble-row.system {
        justify-content: flex-start;
      }
      .bubble {
        max-width: 84%;
        border-radius: 14px;
        padding: 9px 11px;
        font-size: 13px;
        line-height: 1.4;
        border: 1px solid var(--line);
        white-space: pre-wrap;
      }
      .bubble.user {
        background: var(--user);
      }
      .bubble.model {
        background: var(--model);
      }
      .bubble.system {
        background: var(--system);
      }
      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        margin-top: 10px;
      }
      .quick-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
        margin-top: 8px;
      }
      details.panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 9px;
        background: var(--panel);
        margin-top: 10px;
      }
      details.panel > summary {
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        color: #173052;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 8px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .full {
        grid-column: 1/-1;
      }
      label {
        font-size: 11px;
        color: var(--muted);
      }
      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        font-size: 13px;
        outline: none;
        background: #fff;
      }
      input:focus,
      select:focus {
        border-color: #14b8a6;
        box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.2);
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 8px 10px;
        cursor: pointer;
        font-weight: 700;
        font-size: 12px;
        color: #fff;
        background: var(--accent);
      }
      button:hover {
        background: var(--accent-2);
      }
      button.secondary {
        background: #46607f;
      }
      button.danger {
        background: var(--danger);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .media {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      }
      video,
      img.capture {
        width: 100%;
        min-height: 120px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #0f172a;
        object-fit: cover;
      }
      .split {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 8px;
      }
      .raw,
      .logs {
        margin: 0;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #091426;
        color: #d8f3ff;
        padding: 10px;
        font-family: Consolas, 'Courier New', monospace;
        font-size: 11px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow: auto;
      }
      .raw {
        min-height: 100px;
        max-height: 160px;
      }
      .logs {
        min-height: 120px;
        max-height: 170px;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
      }
      .audio {
        width: 100%;
        margin-top: 8px;
      }
      @media (max-width: 420px) {
        .app {
          padding: 10px 8px 16px;
        }
        .phone {
          border-radius: 18px;
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <main class="phone">
        <header class="topbar">
          <div class="brand">
            <h1>Meal AI Chat</h1>
            <p>Mobile-style conversation screen</p>
          </div>
          <div id="status" class="status-pill warn">idle</div>
        </header>

        <div class="row top-actions">
          <button type="button" id="connectBtn">Connect</button>
          <button type="button" id="disconnectBtn" class="secondary" disabled>Disconnect</button>
          <button type="button" id="runFlowBtn" class="secondary">Auto Login + Connect</button>
          <button type="button" id="resetContextBtn" class="danger">Reset Context</button>
        </div>

        <section class="mode-switch">
          <button type="button" id="modeTalkBtn" class="active">Talk Mode</button>
          <button type="button" id="modeCaptureBtn" class="secondary">Capture Mode</button>
        </section>

        <section id="talkPanel" class="mode-panel">
          <section id="chatFeed" class="chat-feed">
            <div class="chat-empty">Connect socket and start talking to the model.</div>
          </section>

          <section class="composer">
            <input id="textInput" placeholder="Type message to model..." />
            <button type="button" id="sendTextBtn" disabled>Send</button>
          </section>

          <section class="quick-actions">
            <button type="button" id="startBtn" disabled>Start Mic</button>
            <button type="button" id="stopBtn" class="danger" disabled>Stop + End</button>
            <button type="button" id="micPlaybackBtn" class="secondary">Mic Test</button>
            <button type="button" id="toggleAudioBtn" class="secondary">Auto Audio: ON</button>
          </section>
        </section>

        <details class="panel" open>
          <summary>Account & Session</summary>
          <div class="grid">
            <div class="field full">
              <label for="apiBase">API Base URL</label>
              <input id="apiBase" value="http://127.0.0.1:3000" />
            </div>
            <div class="field">
              <label for="name">Name</label>
              <input id="name" placeholder="Your name" />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" placeholder="you@example.com" />
            </div>
            <div class="field full">
              <label for="password">Password</label>
              <input id="password" type="password" placeholder="********" />
            </div>
            <div class="field full">
              <label for="token">JWT Token</label>
              <input id="token" placeholder="Auto-filled after login/register" />
            </div>
          </div>
          <div class="row top-actions">
            <button type="button" id="registerBtn">Register</button>
            <button type="button" id="loginBtn">Login</button>
          </div>
        </details>

        <details id="mealPanel" class="panel mode-panel hidden">
          <summary>Meal Camera Flow</summary>
          <div class="grid">
            <div class="field">
              <label for="mealLocale">Locale</label>
              <input id="mealLocale" value="en" />
            </div>
            <div class="field">
              <label for="mealServings">Servings</label>
              <input id="mealServings" type="number" min="1" max="20" value="2" />
            </div>
            <div class="field full">
              <label for="mealConstraints">Constraints</label>
              <input id="mealConstraints" placeholder="high protein, low sodium" />
            </div>
            <div class="field full">
              <label for="mealPreferences">Preferences</label>
              <input id="mealPreferences" placeholder="less oil" />
            </div>
            <div class="field full">
              <label for="dishSelect">Selected Dish</label>
              <select id="dishSelect">
                <option value="">(No suggestion yet)</option>
              </select>
            </div>
            <div class="field">
              <label for="mealRating">Rating</label>
              <input id="mealRating" type="number" min="1" max="5" value="5" />
            </div>
            <div class="field">
              <label for="mealAteAt">Ate At</label>
              <input id="mealAteAt" type="datetime-local" />
            </div>
            <div class="field full">
              <label for="mealNote">Save Note</label>
              <input id="mealNote" placeholder="How did it turn out?" />
            </div>
          </div>
          <div class="row top-actions">
            <button type="button" id="startCamBtn">Start Cam</button>
            <button type="button" id="stopCamBtn" class="secondary" disabled>Stop Cam</button>
            <button type="button" id="captureSuggestBtn" class="secondary">
              Capture + Suggest
            </button>
          </div>
          <div class="row">
            <button type="button" id="syncContextBtn" class="secondary">Sync Context</button>
            <button type="button" id="generateRecipeBtn" class="secondary">Generate Recipe</button>
            <button type="button" id="saveRecipeBtn" class="secondary">Save Recipe</button>
            <button type="button" id="runMealFlowBtn" class="secondary">Run Meal Flow</button>
          </div>
          <div class="media">
            <video id="webcamPreview" autoplay playsinline muted></video>
            <img id="capturedImage" class="capture" alt="Captured image preview" />
          </div>
          <canvas id="webcamCanvas" style="display: none"></canvas>
        </details>

        <details class="panel">
          <summary>Raw API & Debug</summary>
          <div class="split">
            <pre id="suggestRaw" class="raw"></pre>
            <pre id="generateRaw" class="raw"></pre>
            <pre id="saveRaw" class="raw"></pre>
          </div>
          <div class="meta">
            <strong>Live Logs</strong>
            <button type="button" id="clearBtn" class="secondary">Clear</button>
          </div>
          <div id="logs" class="logs"></div>
          <audio id="micPlayback" class="audio" controls></audio>
        </details>
      </main>
    </div>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
      const el = {
        apiBase: document.getElementById('apiBase'),
        modeTalkBtn: document.getElementById('modeTalkBtn'),
        modeCaptureBtn: document.getElementById('modeCaptureBtn'),
        talkPanel: document.getElementById('talkPanel'),
        mealPanel: document.getElementById('mealPanel'),
        chatFeed: document.getElementById('chatFeed'),
        name: document.getElementById('name'),
        email: document.getElementById('email'),
        password: document.getElementById('password'),
        token: document.getElementById('token'),
        textInput: document.getElementById('textInput'),
        registerBtn: document.getElementById('registerBtn'),
        loginBtn: document.getElementById('loginBtn'),
        connectBtn: document.getElementById('connectBtn'),
        disconnectBtn: document.getElementById('disconnectBtn'),
        runFlowBtn: document.getElementById('runFlowBtn'),
        resetContextBtn: document.getElementById('resetContextBtn'),
        sendTextBtn: document.getElementById('sendTextBtn'),
        startBtn: document.getElementById('startBtn'),
        stopBtn: document.getElementById('stopBtn'),
        micPlaybackBtn: document.getElementById('micPlaybackBtn'),
        toggleAudioBtn: document.getElementById('toggleAudioBtn'),
        clearBtn: document.getElementById('clearBtn'),
        micPlayback: document.getElementById('micPlayback'),
        mealLocale: document.getElementById('mealLocale'),
        mealConstraints: document.getElementById('mealConstraints'),
        mealServings: document.getElementById('mealServings'),
        mealPreferences: document.getElementById('mealPreferences'),
        mealRating: document.getElementById('mealRating'),
        mealAteAt: document.getElementById('mealAteAt'),
        mealNote: document.getElementById('mealNote'),
        dishSelect: document.getElementById('dishSelect'),
        startCamBtn: document.getElementById('startCamBtn'),
        stopCamBtn: document.getElementById('stopCamBtn'),
        captureSuggestBtn: document.getElementById('captureSuggestBtn'),
        syncContextBtn: document.getElementById('syncContextBtn'),
        generateRecipeBtn: document.getElementById('generateRecipeBtn'),
        saveRecipeBtn: document.getElementById('saveRecipeBtn'),
        runMealFlowBtn: document.getElementById('runMealFlowBtn'),
        webcamPreview: document.getElementById('webcamPreview'),
        capturedImage: document.getElementById('capturedImage'),
        webcamCanvas: document.getElementById('webcamCanvas'),
        suggestRaw: document.getElementById('suggestRaw'),
        generateRaw: document.getElementById('generateRaw'),
        saveRaw: document.getElementById('saveRaw'),
        status: document.getElementById('status'),
        logs: document.getElementById('logs'),
      };
      let socket = null,
        stream = null,
        audioContext = null,
        sourceNode = null,
        processorNode = null,
        captureActive = false,
        micTestInProgress = false,
        autoPlayModelAudio = true,
        playbackAudioContext = null,
        playbackCursorSec = 0,
        webcamStream = null,
        mealFlowInProgress = false,
        mealContextSyncTimer = null,
        latestAnalysisToken = '',
        latestSuggestionItems = [],
        latestInputImageUrl = '',
        latestRecipeToken = '',
        latestCapturedImageBlob = null,
        activeMode = 'talk';
      const TARGET_SAMPLE_RATE = 16000;
      function toLocalDateTimeValue(date) {
        const offsetDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
        return offsetDate.toISOString().slice(0, 16);
      }
      function setDefaultMealMeta() {
        el.mealRating.value = '5';
        el.mealAteAt.value = toLocalDateTimeValue(new Date());
        el.mealNote.value = '';
      }
      function toIsoDateTimeOrUndefined(value) {
        if (!value) return undefined;
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) {
          throw new Error('Ate At must be a valid date/time');
        }
        return parsed.toISOString();
      }
      function clearRecipeDraftState(clearRaw) {
        latestRecipeToken = '';
        if (clearRaw) {
          setRaw(el.generateRaw, '');
          setRaw(el.saveRaw, '');
        }
      }
      function setStatus(text, kind) {
        el.status.textContent = text;
        el.status.className = `status-pill ${kind || 'warn'}`;
      }
      function log(event, payload) {
        const ts = new Date().toISOString();
        const line = `[${ts}] ${event}${payload !== undefined ? `: ${payload}` : ''}`;
        el.logs.textContent += `${line}\n`;
        el.logs.scrollTop = el.logs.scrollHeight;
      }
      function setMode(mode) {
        activeMode = mode === 'capture' ? 'capture' : 'talk';
        const talkActive = activeMode === 'talk';
        el.talkPanel.classList.toggle('hidden', !talkActive);
        el.mealPanel.classList.toggle('hidden', talkActive);
        el.modeTalkBtn.classList.toggle('active', talkActive);
        el.modeCaptureBtn.classList.toggle('active', !talkActive);
        el.modeTalkBtn.classList.toggle('secondary', !talkActive);
        el.modeCaptureBtn.classList.toggle('secondary', talkActive);
      }
      function appendChat(role, text) {
        if (!text) return;
        const empty = el.chatFeed.querySelector('.chat-empty');
        if (empty) empty.remove();
        const row = document.createElement('div');
        row.className = `bubble-row ${role}`;
        const bubble = document.createElement('div');
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;
        row.appendChild(bubble);
        el.chatFeed.appendChild(row);
        el.chatFeed.scrollTop = el.chatFeed.scrollHeight;
      }
      function resetChatFeed(message) {
        el.chatFeed.innerHTML = '';
        if (message) {
          appendChat('system', message);
          return;
        }
        el.chatFeed.innerHTML =
          '<div class="chat-empty">Connect socket and start talking to the model.</div>';
      }
      function resetLocalContextState() {
        latestAnalysisToken = '';
        latestSuggestionItems = [];
        latestInputImageUrl = '';
        latestCapturedImageBlob = null;
        clearRecipeDraftState(true);
        if (mealContextSyncTimer) {
          clearTimeout(mealContextSyncTimer);
          mealContextSyncTimer = null;
        }
        el.textInput.value = '';
        el.mealConstraints.value = '';
        el.mealPreferences.value = '';
        el.capturedImage.removeAttribute('src');
        setDishOptions([]);
        setRaw(el.suggestRaw, '');
        resetChatFeed('Context reset. Start a new meal conversation.');
        setDefaultMealMeta();
        updateButtons();
      }
      async function reconnectSocketAfterReset() {
        if (!socket?.connected) {
          return;
        }
        try {
          socket.removeAllListeners();
          socket.disconnect();
        } catch (_) {}
        socket = null;
        stopMic(false);
        if (playbackAudioContext) {
          try {
            playbackAudioContext.close();
          } catch (_) {}
          playbackAudioContext = null;
          playbackCursorSec = 0;
        }
        await connectSocket();
      }
      async function resetContext() {
        const base = el.apiBase.value.trim();
        const token = el.token.value.trim();
        const hadActiveSocket = Boolean(socket?.connected);

        try {
          setMode('talk');
          resetLocalContextState();

          if (base && token) {
            const res = await fetch(`${base}/api/v1/meal-assistant/context/reset`, {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}` },
            });
            const raw = await res.text();
            if (!res.ok) {
              throw new Error(`reset context failed (${res.status}): ${raw}`);
            }
          }

          if (hadActiveSocket) {
            setStatus('reconnecting after context reset...', 'warn');
            await reconnectSocketAfterReset();
          }

          setStatus('context reset', 'ok');
        } catch (error) {
          log('reset_context_error', String(error));
          setStatus('reset context failed', 'bad');
          appendChat('system', `Reset failed: ${String(error)}`);
        }
      }
      function updateButtons() {
        const connected = Boolean(socket && socket.connected),
          recording = captureActive,
          camReady = Boolean(webcamStream),
          hasToken = Boolean(el.token.value.trim()),
          hasAnalysis = Boolean(latestAnalysisToken),
          hasRecipe = Boolean(latestRecipeToken),
          canSaveImage = Boolean(webcamStream || latestCapturedImageBlob),
          canSaveRecipe = hasToken && hasAnalysis && hasRecipe && Boolean(latestInputImageUrl) && canSaveImage;
        el.connectBtn.disabled = connected;
        el.disconnectBtn.disabled = !connected;
        el.sendTextBtn.disabled = !connected;
        el.startBtn.disabled = !connected || recording;
        el.stopBtn.disabled = !connected || !recording;
        el.micPlaybackBtn.disabled = recording || micTestInProgress;
        el.startCamBtn.disabled = camReady || mealFlowInProgress;
        el.stopCamBtn.disabled = !camReady || mealFlowInProgress;
        el.captureSuggestBtn.disabled = !camReady || !hasToken || mealFlowInProgress;
        el.syncContextBtn.disabled = !connected || !hasAnalysis || mealFlowInProgress;
        el.generateRecipeBtn.disabled = !hasAnalysis || !hasToken || mealFlowInProgress;
        el.saveRecipeBtn.disabled = !canSaveRecipe || mealFlowInProgress;
        el.runMealFlowBtn.disabled = !hasToken || mealFlowInProgress;
        el.toggleAudioBtn.textContent = `Auto Play Audio: ${autoPlayModelAudio ? 'ON' : 'OFF'}`;
      }
      function bufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        const step = 0x8000;
        for (let i = 0; i < bytes.length; i += step) {
          binary += String.fromCharCode(...bytes.subarray(i, i + step));
        }
        return btoa(binary);
      }
      function base64ToBytes(base64) {
        const binary = atob(base64),
          bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }
      function parseSampleRateFromMime(mimeType) {
        if (!mimeType) return 24000;
        const m = mimeType.match(/rate=(\d+)/i);
        return m ? Number(m[1]) || 24000 : 24000;
      }
      function playModelPcmChunk(chunkBase64, mimeType) {
        if (
          !autoPlayModelAudio ||
          !chunkBase64 ||
          typeof chunkBase64 !== 'string' ||
          !mimeType?.toLowerCase().startsWith('audio/pcm')
        )
          return;
        const sampleRate = parseSampleRateFromMime(mimeType),
          pcmBytes = base64ToBytes(chunkBase64);
        if (pcmBytes.length < 2) return;
        if (!playbackAudioContext) {
          playbackAudioContext = new (window.AudioContext || window.webkitAudioContext)();
          playbackCursorSec = playbackAudioContext.currentTime + 0.03;
        }
        const samplesCount = Math.floor(pcmBytes.length / 2),
          audioBuffer = playbackAudioContext.createBuffer(1, samplesCount, sampleRate),
          channelData = audioBuffer.getChannelData(0),
          view = new DataView(pcmBytes.buffer, pcmBytes.byteOffset, pcmBytes.byteLength);
        for (let i = 0; i < samplesCount; i += 1) {
          channelData[i] = view.getInt16(i * 2, true) / 32768;
        }
        const source = playbackAudioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(playbackAudioContext.destination);
        const startAt = Math.max(playbackAudioContext.currentTime + 0.01, playbackCursorSec);
        source.start(startAt);
        playbackCursorSec = startAt + audioBuffer.duration;
      }
      function downsampleBuffer(input, inputRate, outputRate) {
        if (outputRate >= inputRate) return input;
        const ratio = inputRate / outputRate,
          outputLength = Math.round(input.length / ratio),
          output = new Float32Array(outputLength);
        let outputOffset = 0,
          inputOffset = 0;
        while (outputOffset < outputLength) {
          const nextInputOffset = Math.round((outputOffset + 1) * ratio);
          let sum = 0,
            count = 0;

      el.toggleAudioBtn.addEventListener('click', toggleAudioPlayback);
      el.startCamBtn.addEventListener('click', async () => {
        try {
          await startWebcam();
          setStatus('webcam ready', 'ok');
        } catch (error) {
          log('webcam_start_error', String(error));
          setStatus('cannot start webcam', 'bad');
        } finally {
          updateButtons();
        }
      });
      el.stopCamBtn.addEventListener('click', () => {
        stopWebcam();
        updateButtons();
      });
      el.captureSuggestBtn.addEventListener('click', async () => {
        try {
          mealFlowInProgress = true;
          updateButtons();
          setStatus('capturing and suggesting...', 'warn');
          await suggestDishesFromWebcam();
          if (socket?.connected) await syncMealContextToLive();
          setStatus('suggest-dishes completed', 'ok');
        } catch (error) {
          log('meal_suggest_error', String(error));
          setStatus('suggest-dishes failed', 'bad');
        } finally {
          mealFlowInProgress = false;
          updateButtons();
        }
      });
      el.syncContextBtn.addEventListener('click', async () => {
        try {
          mealFlowInProgress = true;
          updateButtons();
          setStatus('syncing meal context...', 'warn');
          await syncMealContextToLive();
          setStatus('meal context synced', 'ok');
        } catch (error) {
          log('meal_context_sync_error', String(error));
          setStatus('meal context sync failed', 'bad');
        } finally {
          mealFlowInProgress = false;
          updateButtons();
        }
      });
      el.generateRecipeBtn.addEventListener('click', async () => {
        try {
          mealFlowInProgress = true;
          updateButtons();
          setStatus('generating recipe...', 'warn');
          await generateRecipeFromSelectedDish();
          await syncMealContextToLive(el.dishSelect.value);
          setStatus('generate-recipe completed', 'ok');
        } catch (error) {
          log('meal_generate_error', String(error));
          setStatus('generate-recipe failed', 'bad');
        } finally {
          mealFlowInProgress = false;
          updateButtons();
        }
      });
      el.saveRecipeBtn.addEventListener('click', async () => {
        try {
          mealFlowInProgress = true;
          updateButtons();
          setStatus('saving recipe...', 'warn');
          await saveRecipeFromCurrentFlow();
        } catch (error) {
          log('meal_save_error', String(error));
          setStatus('save recipe failed', 'bad');
          appendChat('system', `Save failed: ${String(error)}`);
        } finally {
          mealFlowInProgress = false;
          updateButtons();
        }
      });
      el.runMealFlowBtn.addEventListener('click', runMealWebcamFlow);
      el.dishSelect.addEventListener('change', scheduleAutoMealContextSync);
      el.mealPreferences.addEventListener('input', scheduleAutoMealContextSync);
      el.clearBtn.addEventListener('click', () => {
        el.logs.textContent = '';
        resetChatFeed();
      });
      el.textInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          event.preventDefault();
          sendTextInput();
        }
      });
      el.token.addEventListener('input', updateButtons);
      window.addEventListener('beforeunload', () => {
        stopWebcam();
        stopMic(false);
        disconnectSocket();
      });
      setRaw(el.suggestRaw, '');
      setRaw(el.generateRaw, '');
      setRaw(el.saveRaw, '');
      setDishOptions([]);
      setDefaultMealMeta();
      setMode('talk');
      setStatus('idle', 'warn');
      appendChat('system', 'Ready. Tap Connect, then start talking or switch to Capture mode.');
      updateButtons();
    </script>
  </body>
</html>
